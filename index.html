  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <nav class="navbar navbar-inverse">
    <div class="container-fluid">
      <div class="navbar-header">
        <a class="navbar-brand" href="#"><i>Shop Mart</i></a>
      </div>
      <ul class="nav navbar-nav">
        <li class="active"><a href="#">Home</a></li>
        <li><a href="owner.html">Owners</a></li>
        <li><a href="product.html">Products</a></li>
        <li><a href="buy.html">Buy now</a></li>
      </ul>
  </nav>
  <div class="slideshow-container">
    <center>
      <div class="mySlides">
        <div class="numbertext">1 / 5</div>
        <img src="images/apple.png" style="width:40%">
        <div class="text">Rs.50,000</div>
      </div>
      <div class="mySlides">
        <div class="numbertext">2 / 5</div>
        <img src="images/iphone.png" style="width:40%">
        <div class="text">Rs.2000</div>
      </div>
      <div class="mySlides">
        <div class="numbertext">3 / 5</div>
        <img src="images/book.png" style="width:40%">
        <div class="text">Rs.800</div>
      </div>
      <div class="mySlides">
        <div class="numbertext">4 / 5</div>
        <img src="images/chair.png" style="width:22%">
        <div class="text">Rs.5000</div>
      </div>
      <div class="mySlides">
        <div class="numbertext">5 / 5</div>
        <img src="images/trimmer.png" style="width:40%">
        <div class="text">Rs.950</div>
      </div>
    </center>
    <a class="prev" onclick="plusSlides(1)">❮</a>
    <a class="next" onclick="plusSlides(1)">❯</a>
  </div>
  <br>
  <div style="text-align:center">
    <span class="dot" onclick="currentSlide(1)"></span>
    <span class="dot" onclick="currentSlide(2)"></span>
    <span class="dot" onclick="currentSlide(3)"></span>
    <span class="dot" onclick="currentSlide(4)"></span>
    <span class="dot" onclick="currentSlide(5)"></span>
  </div>
  <br>
  <br>
  <footer>
    <p>Developed by - Mr. Rajarshi Yadav<br>
      <a href="mailto:hege@example.com">✉ rajarshiyadav1@gmail.com</a>
    </p>
  </footer>
  <script>
    let slideIndex = 1;
    showSlides(slideIndex);

    function plusSlides(n) {
      showSlides(slideIndex += n);
    }

    function currentSlide(n) {
      showSlides(slideIndex = n);
    }
    function showSlides(n) {
      let i;
      let slides = document.getElementsByClassName("mySlides");
      let dots = document.getElementsByClassName("dot");
      if (n > slides.length) { slideIndex = 1 }
      if (n < 1) { slideIndex = slides.length }
      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
      }
      slides[slideIndex - 1].style.display = "block";
      dots[slideIndex - 1].className += " active";
    }
  </script>
</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</html>
